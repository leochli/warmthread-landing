<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warm Thread Labs</title>
  <meta name="description" content="Warm Thread Labs — building character intelligence. Stealth.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧵</text></svg>">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }
    main {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 500;
      margin: 0 0 0.75rem;
      letter-spacing: -0.02em;
    }
    p.tagline {
      color: #888;
      font-size: 1rem;
      margin: 0 0 2.5rem;
      line-height: 1.6;
    }
    a {
      color: #f5f5f5;
      text-decoration: none;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    a:hover {
      border-color: #f5f5f5;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #d48f3e;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .status {
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot"></span>Stealth · 2026</div>
    <h1>Warm Thread Labs</h1>
    <p class="tagline">Building character intelligence.</p>
    <a href="mailto:info@warmthreadlabs.com">info@warmthreadlabs.com</a>
  </main>
</body>
</html>
